<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Products | Bhise'z Ferniture</title>
  <meta name="description" content="Browse our full furniture collection – sofas, beds, mandirs, wardrobes, dining tables, safety doors and more."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/animations.css"/>
  <link rel="stylesheet" href="css/responsive.css"/>
  <style>
    body { background: #f7f7f7; color: #222; }

    /* Navbar light override */
    .navbar {
      background: #fff !important;
      border-bottom: 1px solid #eee !important;
    }
    .navbar .logo-main {
      background: none;
      -webkit-text-fill-color: #111;
      color: #111;
      animation: none;
    }
    .nav-links a { color: #555 !important; }
    .nav-links a:hover, .nav-links a.active { color: #222 !important; }
    .hamburger span { background: #222 !important; }
    .btn-whatsapp { color: #fff !important; }

    /* Mobile top bar */
    .mobile-topbar {
      display: none;
      background: #fff;
      border-bottom: 1px solid #eee;
      padding: 0.75rem 1rem;
      align-items: center;
      gap: 0.75rem;
      position: sticky;
      top: 0;
      z-index: 200;
    }
    .mobile-topbar .back-btn {
      background: none; border: none; cursor: pointer; padding: 0;
      display: flex; align-items: center; color: #222;
    }
    .mobile-topbar .title-block { flex: 1; }
    .mobile-topbar .title-block h2 { font-size: 0.95rem; font-weight: 600; color: #222; margin: 0; font-family: var(--font-body); }
    .mobile-topbar .title-block p  { font-size: 0.7rem; color: #999; margin: 0; }
    .mobile-topbar .icons { display: flex; gap: 0.9rem; align-items: center; }
    .mobile-topbar .icons button, .mobile-topbar .icons a {
      background: none; border: none; cursor: pointer; color: #333;
      display: flex; align-items: center;
    }

    /* Layout */
    .products-page-wrap {
      padding-top: 100px;
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      gap: 0;
    }

    /* Sidebar */
    .filter-sidebar {
      width: 220px;
      flex-shrink: 0;
      background: #fff;
      border-right: 1px solid #eee;
      padding: 1.5rem 1rem;
      align-self: flex-start;
      position: sticky;
      top: 72px;
    }
    .filter-sidebar .filter-heading {
      font-size: 0.68rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888;
      font-weight: 600;
      margin-bottom: 0.75rem;
    }
    .filter-list { list-style: none; padding: 0; margin: 0 0 1.5rem; }
    .filter-list li { margin-bottom: 2px; }
    .filter-list button {
      width: 100%; text-align: left;
      padding: 0.5rem 0.7rem;
      font-size: 0.87rem; color: #444;
      border-radius: 6px;
      font-family: var(--font-body);
      background: transparent; border: none; cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .filter-list button:hover { background: #fef9ef; color: #b8860b; }
    .filter-list button.active { background: #fef9ef; color: #b8860b; font-weight: 500; }
    .filter-divider { border: none; border-top: 1px solid #eee; margin: 0.75rem 0 1rem; }
    .sidebar-wa-btn {
      display: block; background: #25D366; color: #fff !important;
      text-align: center; padding: 0.7rem; border-radius: 8px;
      font-size: 0.8rem; font-weight: 500; margin-top: 1rem;
      transition: opacity 0.2s;
    }
    .sidebar-wa-btn:hover { opacity: 0.9; }

    /* Main */
    .products-content { flex: 1; padding: 1rem 1.25rem 6rem; min-width: 0; }

    /* Search bar */
    .search-row {
      position: relative; margin-bottom: 0.75rem;
    }
    .search-row input {
      width: 100%; padding: 0.65rem 1rem 0.65rem 2.6rem;
      border: 1px solid #ddd; border-radius: 8px;
      font-size: 0.88rem; font-family: var(--font-body);
      color: #333; background: #fff; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-row input:focus { border-color: #C8973A; box-shadow: 0 0 0 3px rgba(200,151,58,0.1); }
    .search-row svg { position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%); color: #bbb; }

    /* Sort row */
    .sort-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 0.75rem; padding-bottom: 0.5rem;
    }
    .sort-row .count { font-size: 0.82rem; color: #888; }
    .sort-row select {
      font-size: 0.8rem; color: #444;
      border: 1px solid #ddd; border-radius: 6px;
      padding: 0.3rem 0.7rem;
      background: #fff; font-family: var(--font-body);
      cursor: pointer; outline: none;
    }

    /* ═══════════════════════════════
       URBAN LADDER STYLE PRODUCT CARDS
       ═══════════════════════════════ */
    .ul-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }

    .ul-card {
      background: #fff;
      border: 0.5px solid #e5e5e5;
      position: relative;
      cursor: pointer;
      transition: box-shadow 0.25s;
      display: flex;
      flex-direction: column;
    }
    .ul-card:hover { box-shadow: 0 4px 24px rgba(0,0,0,0.1); z-index: 1; }

    /* Card image */
    .ul-card-img-wrap {
      position: relative;
      aspect-ratio: 1 / 1;
      background: #f3efe9;
      overflow: hidden;
      flex-shrink: 0;
    }
    .ul-card-img-wrap img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.5s ease;
    }
    .ul-card:hover .ul-card-img-wrap img { transform: scale(1.05); }

    /* Placeholder */
    .ul-img-ph {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0.5rem; background: #f3efe9;
    }
    .ul-img-ph .ph-icon { font-size: 2.5rem; opacity: 0.25; }
    .ul-img-ph span { font-size: 0.68rem; color: #bbb; letter-spacing: 0.1em; text-transform: uppercase; }

    /* Badge */
    .ul-card-badge {
      position: absolute; top: 0; left: 0;
      padding: 0.22rem 0.55rem;
      font-size: 0.65rem; font-weight: 700;
      letter-spacing: 0.05em; color: #fff;
      border-radius: 0 0 5px 0; z-index: 2;
    }
    .badge-new    { background: #e07b39; }
    .badge-hot    { background: #e07b39; }
    .badge-sale   { background: #27ae60; }
    .badge-custom { background: #7d5a9e; }

    /* Heart button */
    .ul-heart {
      position: absolute; top: 0.55rem; right: 0.55rem;
      width: 30px; height: 30px;
      background: rgba(255,255,255,0.92);
      border-radius: 50%; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 2; transition: transform 0.2s, background 0.2s;
      backdrop-filter: blur(4px);
    }
    .ul-heart:hover { transform: scale(1.18); background: #fff; }
    .ul-heart.liked svg { fill: #e74c3c; stroke: #e74c3c; }

    /* WhatsApp hover CTA */
    .ul-card-wa {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: #25D366; color: #fff;
      font-size: 0.7rem; font-weight: 600;
      letter-spacing: 0.04em; text-align: center;
      padding: 0.4rem 0.5rem;
      display: flex; align-items: center; justify-content: center; gap: 0.3rem;
      opacity: 0; transform: translateY(3px);
      transition: opacity 0.2s, transform 0.2s;
      z-index: 3;
      text-decoration: none;
    }
    .ul-card:hover .ul-card-wa { opacity: 1; transform: translateY(0); }

    /* Card body */
    .ul-card-body {
      padding: 0.65rem 0.75rem 0.9rem;
      flex: 1;
      display: flex; flex-direction: column;
    }
    .ul-card-brand {
      font-size: 0.65rem; color: #aaa; font-weight: 400;
      margin-bottom: 0.2rem;
    }
    .ul-card-name {
      font-size: 0.82rem; color: #222; font-weight: 400;
      line-height: 1.35; margin-bottom: 0.55rem;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
      flex: 1;
    }
    .ul-card-prices {
      display: flex; align-items: center;
      gap: 0.35rem; flex-wrap: wrap;
      margin-bottom: 0.5rem;
    }
    .price-now   { font-size: 0.88rem; font-weight: 700; color: #111; }
    .price-was   { font-size: 0.73rem; color: #bbb; text-decoration: line-through; }
    .price-off   { font-size: 0.7rem; font-weight: 600; color: #27ae60; }
    .price-enquire { font-size: 0.82rem; font-weight: 600; color: #9A7228; }

    /* Color swatches */
    .ul-card-swatches {
      display: flex; align-items: center; gap: 0.3rem;
    }
    .swatch {
      width: 15px; height: 15px; border-radius: 50%;
      border: 1.5px solid #e0e0e0; cursor: pointer;
      transition: transform 0.15s, border-color 0.15s; flex-shrink: 0;
    }
    .swatch:hover { transform: scale(1.3); border-color: #999; }
    .swatch.on { border-color: #555; border-width: 2px; }
    .swatch-more { font-size: 0.68rem; color: #888; font-weight: 500; }

    /* ─ Empty state ─ */
    .empty-state {
      grid-column: 1/-1; text-align: center;
      padding: 4rem 1rem; color: #bbb;
    }
    .empty-state p { font-size: 0.88rem; margin-top: 0.5rem; }

    /* ─ Bottom mobile bar ─ */
    .mob-bottom-bar {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #fff; border-top: 1px solid #eee;
      z-index: 400; box-shadow: 0 -2px 12px rgba(0,0,0,0.07);
    }
    .mob-bottom-bar-inner {
      display: flex;
    }
    .mob-bar-btn {
      flex: 1; border: none; background: none;
      padding: 0.65rem 0.5rem; cursor: pointer;
      display: flex; flex-direction: column;
      align-items: center; gap: 0.2rem;
      font-size: 0.68rem; font-weight: 600;
      letter-spacing: 0.06em; color: #444;
      font-family: var(--font-body);
      border-right: 1px solid #eee;
    }
    .mob-bar-btn:last-child { border-right: none; }
    .mob-bar-btn svg { width: 17px; height: 17px; }

    /* ─ Filter sheet ─ */
    .sheet-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.4); z-index: 600;
    }
    .sheet-overlay.on { display: block; }
    .filter-sheet {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #fff; border-radius: 16px 16px 0 0;
      padding: 1rem 1.25rem 2rem;
      z-index: 700; max-height: 70vh; overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94);
    }
    .filter-sheet.on { transform: translateY(0); }
    .sheet-handle { width: 36px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 1rem; }
    .sheet-title { font-size: 0.92rem; font-weight: 600; color: #222; margin-bottom: 0.85rem; font-family: var(--font-body); }
    .sheet-cats { display: flex; flex-wrap: wrap; gap: 0.55rem; }
    .sheet-cat-btn {
      padding: 0.45rem 1rem; border: 1px solid #ddd; border-radius: 50px;
      font-size: 0.8rem; color: #444; font-family: var(--font-body);
      background: #fff; cursor: pointer; transition: all 0.15s;
    }
    .sheet-cat-btn.active { background: #fef9ef; border-color: #C8973A; color: #b8860b; font-weight: 500; }

    /* Responsive */
    @media (max-width: 768px) {
      .filter-sidebar { display: none; }
      .products-content { padding: 0 0 5rem; }
      .sort-row, .search-row { padding: 0 0.75rem; }
      .sort-row { margin-bottom: 0; padding-top: 0.5rem; }
      .search-row { margin-bottom: 0.5rem; }
      .mob-bottom-bar { display: block; }
      .mobile-topbar { display: flex; }

      /* Hide desktop navbar on mobile products page */
      .navbar { display: none; }
    }
    @media (min-width: 1024px) {
      .ul-grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>

  <script src="js/animations.js"></script>
  <script>
  (function(){
    // ── Sidebar category filter ──
    document.querySelectorAll('#sidebarList button').forEach(function(btn){
      btn.addEventListener('click', function(){
        document.querySelectorAll('#sidebarList button').forEach(b=>b.classList.remove('active'));
        this.classList.add('active');
        window.activeFilter = this.dataset.filter;
        // sync sheet
        document.querySelectorAll('.sheet-cat-btn').forEach(function(b){
          b.classList.toggle('active', b.dataset.filter === window.activeFilter);
        });
        window.applyFilter && window.applyFilter();
      });
    });

    // ── Sheet category filter ──
    document.querySelectorAll('.sheet-cat-btn').forEach(function(btn){
      btn.addEventListener('click', function(){
        document.querySelectorAll('.sheet-cat-btn').forEach(b=>b.classList.remove('active'));
        this.classList.add('active');
        window.activeFilter = this.dataset.filter;
        // sync sidebar
        document.querySelectorAll('#sidebarList button').forEach(function(b){
          b.classList.toggle('active', b.dataset.filter === window.activeFilter);
        });
        window.applyFilter && window.applyFilter();
        closeSheet();
      });
    });

    // ── Price filter ──
    document.querySelectorAll('#priceList button').forEach(function(btn){
      btn.addEventListener('click', function(){
        document.querySelectorAll('#priceList button').forEach(b=>b.classList.remove('active'));
        this.classList.add('active');
        window.priceFilter = this.dataset.price;
        window.applyFilter && window.applyFilter();
      });
    });

    // ── Sort ──
    document.getElementById('sortSel').addEventListener('change', function(){
      window.sortOrder = this.value;
      window.applyFilter && window.applyFilter();
    });

    // ── Mobile search ──
    document.getElementById('mobSearchInput').addEventListener('input', function(){
      window.searchQuery = this.value;
      window.applyFilter && window.applyFilter();
    });
    document.getElementById('desktopSearch').addEventListener('input', function(){
      window.searchQuery = this.value;
      window.applyFilter && window.applyFilter();
    });

    // ── Sheet open/close ──
    var sheet   = document.getElementById('filterSheet');
    var overlay = document.getElementById('sheetOverlay');

    function openSheet(){
      sheet.classList.add('on');
      overlay.classList.add('on');
      document.body.style.overflow='hidden';
    }
    function closeSheet(){
      sheet.classList.remove('on');
      overlay.classList.remove('on');
      document.body.style.overflow='';
    }
    overlay.addEventListener('click', closeSheet);
    document.getElementById('filterBarBtn').addEventListener('click', openSheet);
    document.getElementById('catBarBtn').addEventListener('click', openSheet);

    // ── Sort sheet (reuse same sheet for sort on mobile) ──
    document.getElementById('sortBarBtn').addEventListener('click', function(){
      // Simple inline sort prompt using native select
      var sel = document.getElementById('sortSel');
      sel.focus();
    });

    // URL param for pre-selected category
    var params = new URLSearchParams(window.location.search);
    var cat = params.get('cat');
    if(cat){
      window.activeFilter = cat;
      document.querySelectorAll('#sidebarList button, .sheet-cat-btn').forEach(function(b){
        b.classList.toggle('active', b.dataset.filter === cat);
      });
    }
  })();
  </script>
